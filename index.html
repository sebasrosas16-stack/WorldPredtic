<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MatchIQ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="hero glass">
      <p class="eyebrow">IA Football Lab</p>
      <h1>MatchIQ</h1>
      <p class="subtitle">Picks, riesgo y seguimiento de predicciones.</p>
    </section>

    <section class="glass panel">
      <label for="matchSelect">Selecciona partido</label>
      <select id="matchSelect"></select>
    </section>

    <section id="matchCard" class="glass card"></section>

    <section class="glass panel">
      <h2>Track Record</h2>
      <div class="stats">
        <div><strong id="wins">0</strong><span>Buenas</span></div>
        <div><strong id="losses">0</strong><span>Malas</span></div>
        <div><strong id="hitRate">0%</strong><span>Efectividad</span></div>
      </div>
      <button id="resetBtn" class="ghost">Reiniciar historial</button>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
