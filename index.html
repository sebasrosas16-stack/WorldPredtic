<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MatchIQ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="hero glass">
      <p class="eyebrow">IA Football Lab</p>
      <h1>MatchIQ</h1>
      <p class="subtitle">Picks, tickets, bankroll y análisis inteligente.</p>
    </section>

    <section id="screen-home" class="screen active-screen"></section>

    <section id="screen-recommended" class="screen"></section>

    <section id="screen-ticket" class="screen"></section>

    <section id="screen-history" class="screen"></section>

    <section id="screen-profile" class="screen"></section>
  </main>

  <nav class="bottom-nav glass">
    <button class="nav-btn active" onclick="switchTab('home')">🏠<span>Inicio</span></button>
    <button class="nav-btn" onclick="switchTab('recommended')">⭐<span>Picks</span></button>
    <button class="nav-btn" onclick="switchTab('ticket')">🧾<span>Ticket</span></button>
    <button class="nav-btn" onclick="switchTab('history')">📊<span>Historial</span></button>
    <button class="nav-btn" onclick="switchTab('profile')">⚙️<span>Perfil</span></button>
  </nav>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="data.js"></script>
  <script src="model.js"></script>
  <script src="app.js"></script>
</body>
</html>
