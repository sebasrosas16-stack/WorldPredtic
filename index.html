<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MatchIQ</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section class="hero glass">
      <p class="eyebrow">IA Football Lab</p>
      <h1>MatchIQ</h1>
      <p class="subtitle">Picks, riesgo, value y seguimiento de predicciones.</p>
    </section>

    <section id="dailySuggestion" class="glass panel">
      <h2>Sugerencia del día</h2>
      <p class="note">Cargando modelo...</p>
    </section>

    <section class="glass panel">
      <div class="select-grid">
        <div>
          <label for="dateSelect">Fecha</label>
          <select id="dateSelect"></select>
        </div>

        <div>
          <label for="matchSelect">Partido</label>
          <select id="matchSelect"></select>
        </div>
      </div>
    </section>

    <section id="matchCard" class="glass card"></section>

    <section class="glass panel">
      <h2>Track Record</h2>
      <div class="stats">
        <div><strong id="wins">0</strong><span>Buenas</span></div>
        <div><strong id="losses">0</strong><span>Malas</span></div>
        <div><strong id="hitRate">0%</strong><span>Efectividad</span></div>
      </div>
      <button id="resetBtn" class="ghost">Reiniciar historial</button>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="data.js"></script>
  <script src="model.js"></script>
  <script src="app.js"></script>
</body>
</html>
